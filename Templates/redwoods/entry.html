<!DOCTYPE html>
<html>
  {{> head}}
  <body class="page_home">
    <div class="container-grid">
      {{> header}}
      <div class="item container-primary">
        
        {{#entry}}
        {{#date}}
          <a class="small date" href="{{{url}}}">{{date}}</a>
        {{/date}}
          
        {{{html}}}

        {{#tags.length}}
          <p>
            {{#tags}}
            <a class="small tag" href="/tagged/{{slug}}">{{name}}</a>
            {{/tags}}
          </p>
          {{/tags.length}}

        {{/entry}}
      </div>
      
      <div class="item container-secondary">
        <section>
          {{> promos}}
        </section>
      </div>
      {{> footer}}
    </div>
    
  </body>
</html>
